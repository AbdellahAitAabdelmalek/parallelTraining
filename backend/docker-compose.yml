version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: parallel_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parallel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parallel_password}
      POSTGRES_DB: ${POSTGRES_DB:-parallel_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-parallel_user} -d ${POSTGRES_DB:-parallel_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_test:
    image: pgvector/pgvector:pg16
    container_name: parallel_postgres_test
    environment:
      POSTGRES_USER: parallel_user
      POSTGRES_PASSWORD: parallel_password
      POSTGRES_DB: parallel_db_test
    ports:
      - '5433:5432'
    volumes:
      - ../docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U parallel_user -d parallel_db_test']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
